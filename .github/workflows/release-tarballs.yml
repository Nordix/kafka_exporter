---
name: Release Tarballs
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - '*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24.0
      - uses: olegtarasov/get-tag@v2.1
        id: tagName
      - name: Build release tarballs
        run: |
          make release
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://artifactory.nordix.org/
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
      - name: Upload tarballs tarballs to Artifactory
        run: |
          jf rt upload ".tarballs/*" \
             "allies/kafka_exporter/${{ steps.tagName.outputs.tag }}/" \
            --build-name="kafka_exporter" \
            --build-number="${{ steps.tagName.outputs.tag }}"